# ╔════════════════════════════════════════════════════════════════╗
# ║  OshiUI — SwiftLint Configuration                              ║
# ╚════════════════════════════════════════════════════════════════╝

included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

# ── Enabled Rules ──────────────────────────────────────────────────
opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - private_action
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# ── Disabled Rules ─────────────────────────────────────────────────
disabled_rules:
  - trailing_comma

# ── Rule Configuration ────────────────────────────────────────────
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 200
  error: 300

file_length:
  warning: 300
  error: 500

function_body_length:
  warning: 30
  error: 50

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z
    - r
    - g
    - b
    - i

nesting:
  type_level: 3
  function_level: 3

reporter: xcode
